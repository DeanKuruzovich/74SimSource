<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>74Sim — Introduction to Digital Hardware</title>
  <link rel="icon" type="image/png" href="/assets/Logo74Sim.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/onramp.css">
</head>
<body data-allow-small="1">
  <div id="onramp-app">

    <!-- ── Toolbar ──────────────────────────────────────────────────────── -->
    <div id="onramp-toolbar">
      <a href="/" class="toolbar-title">74Sim</a>
      <span class="toolbar-sep">/</span>
      <span id="onramp-lesson-title"></span>
      <div class="toolbar-spacer"></div>
      <div id="onramp-toolbar-actions"></div>
    </div>

    <!-- ── Body: Instructions + Canvas ─────────────────────────────────── -->
    <div id="onramp-body">

      <!-- Left: Instruction Panel -->
      <div id="onramp-panel">
        <div id="onramp-step-content"></div>
        <div id="onramp-step-nav">
          <button class="onramp-nav-btn" id="onramp-btn-back" disabled data-i18n="onramp.back">Back</button>
          <button class="onramp-nav-btn primary" id="onramp-btn-next" disabled data-i18n="onramp.next">Next</button>
        </div>
      </div>

      <!-- Right: Simulator Canvas -->
      <div id="onramp-canvas-area">
        <canvas id="board-canvas"></canvas>
      </div>

    </div>

    <!-- ── Progress Bar ────────────────────────────────────────────────── -->
    <div id="onramp-progress">
      <div id="onramp-progress-bar"></div>
      <span id="onramp-progress-text"></span>
    </div>

  </div>

  <script type="module" src="/js/i18n.js"></script>
  <script type="module" src="/js/onramp.js"></script>
<!-- 100% privacy-first analytics -->
<script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
