<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>74Sim Feedback</title>
  <link rel="icon" type="image/png" href="assets/Logo74Sim.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/report-form.css">
</head>
<body>

  <div class="content">
    <div class="page-heading">Your Feedback</div>
    <form id="feedback-form">
      <div class="form-group">
        <textarea id="feedback-description" rows="6" placeholder="Share your thoughts, suggestions, or questions..." required></textarea>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Submit Feedback</button>
     
      <div class="status-msg" id="status-msg"></div>
    </form>
  </div>

  <script src="/js/feedback.js" defer></script>
<!-- 100% privacy-first analytics -->
<script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
